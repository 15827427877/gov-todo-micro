server:
  port: 8080
spring:
  application:
    name: gateway-server
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        enabled: false
    gateway:
      routes:
        - id: todo-service
          uri: lb://todo-service
          predicates:
            - Path=/todo/**
        - id: system-service
          uri: lb://system-service
          predicates:
            - Path=/system/**
