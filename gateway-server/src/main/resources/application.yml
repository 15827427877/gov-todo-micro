server:
  port: 8081
spring:
  application:
    name: gateway-server
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        enabled: false
    gateway:
      routes:
        - id: todo-service
          uri: http://localhost:8090
          predicates:
            - Path=/todo/**
        - id: system-service
          uri: http://localhost:8091
          predicates:
            - Path=/system/**
          filters:
            - RewritePath=/system/(?<segment>.*), /${segment}
